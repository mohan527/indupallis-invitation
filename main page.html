<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Indupallis Invitation</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(160deg, #dff6ff 0%, #e8d5f5 50%, #c8e8ff 100%);
      min-height: 100vh; min-height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 20px;
      position: relative; overflow: hidden;
    }
    /* Floating doodles animation */
    .doodle-bg { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }
    .floater {
      position: absolute;
      animation: floatUp 8s linear infinite;
      opacity: 0.22;
    }
    .floater:nth-child(2)  { left:8%;  animation-delay:0s;    animation-duration:9s; }
    .floater:nth-child(3)  { left:20%; animation-delay:1.5s;  animation-duration:7s; }
    .floater:nth-child(4)  { left:35%; animation-delay:3s;    animation-duration:10s; }
    .floater:nth-child(5)  { left:55%; animation-delay:0.8s;  animation-duration:8s; }
    .floater:nth-child(6)  { left:70%; animation-delay:2s;    animation-duration:6s; }
    .floater:nth-child(7)  { left:85%; animation-delay:4s;    animation-duration:9s; }
    .floater:nth-child(8)  { left:45%; animation-delay:5s;    animation-duration:7s; }
    .floater:nth-child(9)  { left:15%; animation-delay:6s;    animation-duration:11s; }
    .floater:nth-child(10) { left:75%; animation-delay:2.5s;  animation-duration:8s; }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(1);   opacity: 0; }
      10%  { opacity: 0.22; }
      90%  { opacity: 0.22; }
      100% { transform: translateY(-10vh) scale(1.1); opacity: 0; }
    }
    /* Pigeon flap animation */
    @keyframes flapWings {
      0%,100% { transform: scaleY(1); }
      50%      { transform: scaleY(0.6); }
    }
    .pigeon-wings { display:inline-block; animation: flapWings 0.6s ease-in-out infinite; transform-origin: center; }
    /* Content */
    .content { position:relative; z-index:1; display:flex; flex-direction:column; align-items:center; gap:10px; }
    .tagline-top {
      font-size: clamp(0.8rem, 3.5vw, 1rem);
      color: #7c3aed;
      letter-spacing: 5px;
      text-transform: uppercase;
      opacity: 0.8;
      margin-bottom: 4px;
    }
    h1 {
      font-size: clamp(1.6rem, 6.5vw, 2.8rem);
      color: #5b3a8a;
      letter-spacing: 2px;
      text-shadow: 1px 1px 10px rgba(150,100,220,0.2);
      line-height: 1.3;
      padding: 0 10px;
      margin-bottom: 6px;
    }
    .rings-doodle { font-size: clamp(1.6rem, 6vw, 2.2rem); margin: 8px 0; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.12);} }
    .invite-btn {
      display: inline-block;
      width: 90%; max-width: 300px;
      padding: 17px 30px;
      background: linear-gradient(135deg, #a78bfa, #7dd3fc);
      color: #fff;
      font-size: clamp(1rem, 4.5vw, 1.15rem);
      font-weight: bold; font-family:'Georgia',serif;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 25px rgba(139,92,246,0.35);
      border: 2px solid rgba(255,255,255,0.5);
      touch-action: manipulation; cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-top: 10px;
    }
    .invite-btn:active { transform:scale(0.96); }
    @media (hover:hover) {
      .invite-btn:hover { transform:translateY(-4px) scale(1.03); box-shadow:0 12px 35px rgba(139,92,246,0.5); }
    }
    .tagline-bottom {
      font-size: clamp(0.75rem, 3vw, 0.9rem);
      color: #6b7280;
      letter-spacing: 2px;
      margin-top: 14px;
      font-style: italic;
      opacity: 0.85;
    }
    .bells { font-size: clamp(1.2rem, 5vw, 1.6rem); margin-top: 6px; animation: swing 1.4s ease-in-out infinite; display:inline-block; transform-origin: top center; }
    @keyframes swing { 0%,100%{transform:rotate(-12deg);} 50%{transform:rotate(12deg);} }
  </style>
</head>
<body>

  <!-- Floating Doodles Background -->
  <div class="doodle-bg">
    <!-- Pigeons -->
    <div class="floater" style="left:8%;font-size:2rem;"><span class="pigeon-wings">🕊️</span></div>
    <div class="floater" style="left:72%;font-size:1.6rem;"><span class="pigeon-wings">🕊️</span></div>
    <div class="floater" style="left:40%;font-size:2.2rem;"><span class="pigeon-wings">🕊️</span></div>
    <!-- Engagement Rings -->
    <div class="floater" style="left:20%;font-size:1.8rem;">💍</div>
    <div class="floater" style="left:60%;font-size:1.4rem;">💍</div>
    <!-- Church Bells -->
    <div class="floater" style="left:85%;font-size:1.8rem;">🔔</div>
    <div class="floater" style="left:30%;font-size:1.5rem;">🔔</div>
    <!-- Hearts -->
    <div class="floater" style="left:50%;font-size:1.4rem;color:#c084fc;">♥</div>
    <div class="floater" style="left:15%;font-size:1rem;color:#7dd3fc;">♥</div>
    <div class="floater" style="left:78%;font-size:1.2rem;color:#a78bfa;">♥</div>
  </div>

  <!-- Static SVG Doodle rings top corners -->
  <svg style="position:fixed;top:10px;left:10px;z-index:0;opacity:0.18;" width="80" height="50" viewBox="0 0 80 50">
    <circle cx="20" cy="25" r="18" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="42" cy="25" r="18" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  </svg>
  <svg style="position:fixed;top:10px;right:10px;z-index:0;opacity:0.18;transform:scaleX(-1);" width="80" height="50" viewBox="0 0 80 50">
    <circle cx="20" cy="25" r="18" fill="none" stroke="#7c3aed" stroke-width="3"/>
    <circle cx="42" cy="25" r="18" fill="none" stroke="#0ea5e9" stroke-width="3"/>
  </svg>
  <!-- Bottom corner flowers -->
  <svg style="position:fixed;bottom:10px;left:10px;z-index:0;opacity:0.18;" width="60" height="60" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="10" fill="#f0abfc"/>
    <circle cx="44" cy="20" r="10" fill="#e879f9"/>
    <circle cx="44" cy="40" r="10" fill="#e879f9"/>
    <circle cx="16" cy="20" r="10" fill="#e879f9"/>
    <circle cx="16" cy="40" r="10" fill="#e879f9"/>
    <circle cx="30" cy="30" r="7" fill="#fde68a"/>
  </svg>
  <svg style="position:fixed;bottom:10px;right:10px;z-index:0;opacity:0.18;" width="60" height="60" viewBox="0 0 60 60">
    <circle cx="30" cy="30" r="10" fill="#bfdbfe"/>
    <circle cx="44" cy="20" r="10" fill="#93c5fd"/>
    <circle cx="44" cy="40" r="10" fill="#93c5fd"/>
    <circle cx="16" cy="20" r="10" fill="#93c5fd"/>
    <circle cx="16" cy="40" r="10" fill="#93c5fd"/>
    <circle cx="30" cy="30" r="7" fill="#fde68a"/>
  </svg>

  <!-- Main Content -->
  <div class="content">
    <p class="tagline-top">✦ You Are Cordially Invited ✦</p>
    <h1>Indupallis<br/>Invitation</h1>
    <div class="rings-doodle">💍 💍</div>
    <a href="index.html" class="invite-btn">💌 Open Invitation</a>
    <div class="bells">🔔 🔔</div>
    <p class="tagline-bottom">A celebration of love &amp; new beginnings</p>
  </div>

</body>
</html>
