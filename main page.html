<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Indupallis Invitation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1a0a00, #3d1a00);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }
    h1 {
      font-size: clamp(1.4rem, 6vw, 2.4rem);
      color: #ffd700;
      letter-spacing: 2px;
      margin-bottom: 40px;
      text-shadow: 2px 2px 10px rgba(255,215,0,0.4);
      line-height: 1.4;
      padding: 0 10px;
    }
    .invite-btn {
      display: inline-block;
      width: 90%;
      max-width: 320px;
      padding: 18px 30px;
      background: linear-gradient(135deg, #ffd700, #ffb300);
      color: #1a0a00;
      font-size: clamp(1rem, 4.5vw, 1.2rem);
      font-weight: bold;
      font-family: 'Georgia', serif;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 1.5px;
      box-shadow: 0 6px 25px rgba(255,215,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s;
      touch-action: manipulation;
      cursor: pointer;
    }
    .invite-btn:active {
      transform: scale(0.96);
      box-shadow: 0 3px 12px rgba(255,215,0,0.4);
    }
    @media (hover: hover) {
      .invite-btn:hover {
        transform: translateY(-4px) scale(1.03);
        box-shadow: 0 12px 35px rgba(255,215,0,0.7);
      }
    }
  </style>
</head>
<body>
  <h1>Indupallis Invitation</h1>
  <a href="index.html" class="invite-btn">Indupallis Invitation</a>
</body>
</html>
