<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Indupallis Invitation</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Georgia', serif;
      background: linear-gradient(135deg, #1a0a00, #3d1a00);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    h1 {
      font-size: 2.2rem;
      color: #ffd700;
      letter-spacing: 3px;
      margin-bottom: 35px;
      text-shadow: 2px 2px 10px rgba(255,215,0,0.4);
    }
    .invite-btn {
      display: inline-block;
      padding: 16px 50px;
      background: linear-gradient(135deg, #ffd700, #ffb300);
      color: #1a0a00;
      font-size: 1.2rem;
      font-weight: bold;
      font-family: 'Georgia', serif;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 2px;
      box-shadow: 0 6px 25px rgba(255,215,0,0.5);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .invite-btn:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 12px 35px rgba(255,215,0,0.7);
    }
  </style>
</head>
<body>
  <h1>Indupallis Invitation</h1>
  <a href="index.html" class="invite-btn">Indupallis Invitation</a>
</body>
</html>
